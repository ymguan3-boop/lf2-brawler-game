<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小小冒險家 - 橫向卷軸動作過關</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Segoe UI','Microsoft YaHei',sans-serif}
body{display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a12 70%)}
#wrapper{text-align:center;animation:fadeIn 0.8s ease-out}
h1{font-size:42px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#f0c040,#ff6b35,#ff4444,#a855f7,#3b82f6);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 3s ease infinite;letter-spacing:4px}
.sub{color:#888;font-size:16px;letter-spacing:2px;margin-bottom:12px}
#border{display:inline-block;padding:4px;border-radius:8px;background:linear-gradient(135deg,#f0c040,#ff6b35,#a855f7,#3b82f6);background-size:400% 400%;animation:gradientShift 4s ease infinite}
canvas{display:block;border-radius:6px;background:#000;width:960px;height:540px}
.controls{margin-top:12px;color:#888;font-size:12px}
.controls span{display:inline-block;background:rgba(255,255,255,0.05);padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);animation:fadeIn 0.8s ease-out 0.6s both;line-height:1.8}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-box{background:linear-gradient(135deg,#1a1a2e,#2a2a4e);border:2px solid #f0c040;border-radius:16px;padding:40px;max-width:500px;width:90%;text-align:center;animation:slideUp 0.4s ease-out}
.modal-box h2{color:#f0c040;font-size:28px;margin-bottom:16px}
.modal-box input{width:80%;padding:12px 20px;font-size:18px;border:2px solid #555;border-radius:8px;background:#0a0a12;color:#fff;text-align:center;outline:none;margin-bottom:16px}
.modal-box input:focus{border-color:#f0c040}
.modal-box button{padding:12px 40px;font-size:18px;font-weight:bold;border:none;border-radius:8px;background:linear-gradient(135deg,#f0c040,#ff6b35);color:#000;cursor:pointer;transition:all 0.2s}
.modal-box button:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(240,192,64,0.5)}
.modal-box button:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.card-container{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.ability-card{width:140px;padding:20px 12px;border:2px solid #555;border-radius:12px;background:#0a0a2e;cursor:pointer;transition:all 0.3s;animation:cardHover 2s ease-in-out infinite}
.ability-card:nth-child(2){animation-delay:0.3s}
.ability-card:nth-child(3){animation-delay:0.6s}
.ability-card:hover{border-color:#f0c040;transform:translateY(-8px);box-shadow:0 8px 25px rgba(240,192,64,0.3)}
.ability-card .icon{font-size:36px;margin-bottom:8px}
.ability-card .name{color:#f0c040;font-size:14px;font-weight:bold;margin-bottom:6px}
.ability-card .desc{color:#aaa;font-size:11px;line-height:1.4}
.lb-container{max-height:400px;overflow-y:auto;margin-top:16px}
.lb-row{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.1);color:#fff;font-size:14px}
.lb-row:nth-child(1){color:#f0c040}
.lb-row:nth-child(2){color:#c0c0c0}
.lb-row:nth-child(3){color:#cd7f32}
.lb-row .rank{width:40px;text-align:left}
.lb-row .name{flex:1;text-align:left}
.lb-row .score{width:80px;text-align:right}
.lb-row .date{width:100px;text-align:right;font-size:11px;color:#888}
#leaderboardBtn{position:fixed;top:10px;right:10px;z-index:100;padding:8px 16px;border:1px solid rgba(240,192,64,0.4);border-radius:20px;background:rgba(0,0,0,0.6);color:#f0c040;font-size:12px;cursor:pointer;display:none}
#leaderboardBtn:hover{background:rgba(240,192,64,0.2)}
#mobileControls{display:none;position:fixed;bottom:0;left:0;width:100%;height:200px;z-index:50;pointer-events:none}
.dpad{position:absolute;left:20px;bottom:20px;width:120px;height:120px;pointer-events:auto}
.dpad-btn{position:absolute;width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);display:flex;justify-content:center;align-items:center;color:#fff;font-size:18px;user-select:none;-webkit-user-select:none;touch-action:none}
.dpad-btn:active{background:rgba(255,255,255,0.35)}
.dpad-up{left:40px;top:0}
.dpad-down{left:40px;bottom:0}
.dpad-left{left:0;top:40px}
.dpad-right{right:0;top:40px}
.action-btns{position:absolute;right:20px;bottom:20px;width:140px;height:140px;pointer-events:auto}
.act-btn{position:absolute;width:44px;height:44px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:#fff;font-size:13px;font-weight:bold;user-select:none;-webkit-user-select:none;touch-action:none;border:2px solid rgba(255,255,255,0.3)}
.act-btn:active{opacity:0.7}
.btn-z{left:0;top:48px;background:rgba(255,100,100,0.4)}
.btn-x{right:0;top:48px;background:rgba(100,100,255,0.4)}
.btn-a{left:48px;top:0;background:rgba(255,200,50,0.4)}
.btn-s{left:48px;bottom:0;background:rgba(100,200,100,0.4)}
@media(max-width:1000px){canvas{width:100%;height:auto;aspect-ratio:16/9}}
@media(pointer:coarse){#mobileControls{display:block}#leaderboardBtn{display:block}}
</style>
</head>
<body>
<div id="wrapper">
<h1>&#x2694; 小小冒險家 &#x2694;</h1>
<p class="sub">道路大亂鬥 &mdash; LF2 風格</p>
<div id="border"><canvas id="game" width="960" height="540"></canvas></div>
<p class="controls"><span>
↑↓←→=自由行走 | Z=出拳 | X=踢擊 | A=大絕招(冷卻10秒) | S=使用道具 | R=重新開始

<!-- Name Input Modal -->
<div id="nameModal" class="modal-overlay active">

</div>

<!-- Level Up Card Modal -->

</div>
</div>

<!-- Mobile Controls -->
<div id="mobileControls">
<div class="dpad">

<div class="dpad-btn dpad-down" data-dir="D">&#x25BC;</div>
<div class="dpad-btn dpad-left" data-dir="L">&#x25C0;</div>
<div class="dpad-btn dpad-right" data-dir="R">&#x25B6;</div>
</div>

<div class="act-btn btn-x" data-key="x">X</div>

</div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const CW=960,CH=540,ROAD_TOP=180,ROAD_BOTTOM=530,LEVEL_LEN=4000;
const KEY={L:'ArrowLeft',R:'ArrowRight',U:'ArrowUp',D:'ArrowDown',P:'z',K:'x',A:'a',S:'s'};
const HERO={HP:500,MP:200,SPD:3.5,JUMP:-9,W:40,H:64,ATK_RNG:100,ATK_DMG:25,MP_REGEN:0.2};
const SCALE=1.56;
const XP_KILL={xiaoguai1:10,xiaoguai2:20,xiaoguai3:30,xiaowang:50};
const XP_PER_LEVEL=100;
const ULT_COOLDOWN=600;
const GAME_TIME=300;
const MAX_ENEMIES=8;
const MAX_BOSSES=5;
const SPAWN_INTERVAL=180;
const ENEMY_CFG={
  xiaoguai1:{name:'小怪1',HP:150,SPD:0.9,DMG:12,W:36,H:56,col:'#a88',
    anim:{idle:{frames:3,dur:14,loop:true},walk:{frames:3,dur:7,loop:true},
      attack:{frames:3,dur:10,loop:false},hurt:{frames:1,dur:6,loop:false},death:{frames:2,dur:12,loop:false}}},
  xiaoguai2:{name:'小怪2',HP:200,SPD:1.1,DMG:15,W:40,H:60,col:'#8af',
    anim:{idle:{frames:3,dur:14,loop:true},walk:{frames:3,dur:6,loop:true},
      attack:{frames:2,dur:12,loop:false},hurt:{frames:1,dur:6,loop:false},death:{frames:1,dur:10,loop:false}}},
  xiaoguai3:{name:'小怪3',HP:250,SPD:1.0,DMG:18,W:42,H:65,col:'#fa0',
    anim:{idle:{frames:3,dur:14,loop:true},walk:{frames:3,dur:7,loop:true},
      attack:{frames:3,dur:10,loop:false},hurt:{frames:1,dur:6,loop:false},death:{frames:1,dur:10,loop:false}}},
  xiaowang:{name:'小王',HP:800,SPD:0.8,DMG:20,W:50,H:70,col:'#f44',
    anim:{idle:{frames:3,dur:14,loop:true},walk:{frames:3,dur:7,loop:true},
      attack:{frames:4,dur:10,loop:false},kick:{frames:3,dur:10,loop:false},
      kickfly:{frames:7,dur:10,loop:false},
      hurt:{frames:1,dur:6,loop:false},death:{frames:1,dur:10,loop:false}}}
};
const ITEM_CFG={
  health:{name:'回血瓶',col:'#4c4',uses:1,dmg:0,throw:false,heal:true},
  knife:{name:'飛刀',col:'#ddd',uses:3,dmg:25,throw:true,pierce:true},
  grenade:{name:'手榴彈',col:'#888',uses:2,dmg:40,throw:true,pierce:true,explode:true}
};
const ITEM_SPRITE_PATH='道具/';
const itemImgs={};
function loadItemImages(cb){
  const map={health:'回血瓶.png',knife:'飛刀.png',grenade:'手榴彈.png'};
  let loaded=0,total=Object.keys(map).length;
  Object.entries(map).forEach(([k,f])=>{
    const img=new Image();
    img.onload=()=>{loaded++;if(loaded>=total)cb()};
    img.onerror=()=>{loaded++;if(loaded>=total)cb()};
    img.src=ITEM_SPRITE_PATH+f;itemImgs[k]=img;
  });
}
const ANIM={
  idle:{frames:1,dur:14,loop:true},walk:{frames:4,dur:6,loop:true},
  punch:{frames:3,dur:10,loop:false},kick:{frames:3,dur:10,loop:false},
  hurt:{frames:1,dur:10,loop:false},death:{frames:3,dur:20,loop:false},
  ultimate:{frames:16,dur:6,loop:false}
};

const ABILITY_DEFS=[
  {id:'punchSpeed',name:'出拳加速',icon:'&#x1F44A;',desc:'每選擇一次出拳速度+10%，可累計',apply:h=>{h.punchSpdMul=(h.punchSpdMul||1)+0.1}},
  {id:'kickCombo',name:'踢擊連擊',icon:'&#x1F9B6;',desc:'每選擇一次踢擊命中判定+1次，可累計',apply:h=>{h.kickBonusHits=(h.kickBonusHits||0)+1}},
  {id:'ultCombo',name:'大絕連擊數增加',icon:'&#x26A1;',desc:'每選擇一次大絕招COMBO+1，可累計',apply:h=>{h.ultBonusHits=(h.ultBonusHits||0)+1}},
  {id:'atkDamage',name:'攻擊傷害+10%',icon:'&#x1F525;',desc:'所有攻擊擊中敵人傷害+10%，可累計',apply:h=>{h.atkDmgMul=(h.atkDmgMul||1)+0.1}},
  {id:'defense',name:'防禦+10%',icon:'&#x1F6E1;',desc:'敵人造成主角的傷害-10%，可累計',apply:h=>{h.defMul=(h.defMul||1)-0.1}}
];

// ============================================================
// AUDIO
// ============================================================
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(t){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    if(t==='hit'){o.type='square';o.frequency.setValueAtTime(150,c.currentTime);o.frequency.exponentialRampToValueAtTime(50,c.currentTime+0.1);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.15);o.start(c.currentTime);o.stop(c.currentTime+0.15)}
    else if(t==='punch'){o.type='sawtooth';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.08);g.gain.setValueAtTime(0.4,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.12);o.start(c.currentTime);o.stop(c.currentTime+0.12)}
    else if(t==='combo'){[523,659,784].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.setValueAtTime(f,c.currentTime+i*0.08);g2.gain.setValueAtTime(0.2,c.currentTime+i*0.08);g2.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.08+0.1);o2.start(c.currentTime+i*0.08);o2.stop(c.currentTime+i*0.08+0.1)})}
    else if(t==='kill'){[400,300,200,100].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='triangle';o2.frequency.setValueAtTime(f,c.currentTime+i*0.1);g2.gain.setValueAtTime(0.3,c.currentTime+i*0.1);g2.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.1+0.15);o2.start(c.currentTime+i*0.1);o2.stop(c.currentTime+i*0.1+0.15)})}
    else if(t==='jump'){o.type='sine';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(500,c.currentTime+0.15);g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.2);o.start(c.currentTime);o.stop(c.currentTime+0.2)}
    else if(t==='phit'){o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.2);g.gain.setValueAtTime(0.4,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.25);o.start(c.currentTime);o.stop(c.currentTime+0.25)}
    else if(t==='boss'){[80,70,60].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(f,c.currentTime+i*0.2);g2.gain.setValueAtTime(0.3,c.currentTime+i*0.2);g2.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.2+0.3);o2.start(c.currentTime+i*0.2);o2.stop(c.currentTime+i*0.2+0.3)})}
    else if(t==='pick'){[880,1100].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.setValueAtTime(f,c.currentTime+i*0.06);g2.gain.setValueAtTime(0.15,c.currentTime+i*0.06);g2.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.06+0.1);o2.start(c.currentTime+i*0.06);o2.stop(c.currentTime+i*0.06+0.1)})}
    else if(t==='throw'){o.type='triangle';o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(800,c.currentTime+0.1);g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.15);o.start(c.currentTime);o.stop(c.currentTime+0.15)}
    else if(t==='brk'){o.type='square';o.frequency.setValueAtTime(600,c.currentTime);o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.15);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.2);o.start(c.currentTime);o.stop(c.currentTime+0.2)}
    else if(t==='levelup'){[523,659,784,1047].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.setValueAtTime(f,c.currentTime+i*0.12);g2.gain.setValueAtTime(0.25,c.currentTime+i*0.12);g2.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.12+0.2);o2.start(c.currentTime+i*0.12);o2.stop(c.currentTime+i*0.12+0.2)})}
  }catch(e){}
}

// ============================================================
// SPRITE DRAWING
// ============================================================
const heroSprites={};
const HERO_SPRITE_PATH='主角動作包/';
const SCENE_PATH='關卡1場景/';
const HERO_STATE_FILES={
  walk:['主角走路_1.png','主角走路_2.png','主角走路_3.png','主角走路_4.png'],
  punch:['主角出拳_1.png','主角出拳_2.png','主角出拳_3.png'],
  kick:['主角踢擊_1.png','主角踢擊_2.png','主角踢擊_3.png'],
  hurt:['主角被擊中_1.png'],
  death:['主角死亡_1.png','主角死亡_2.png','主角死亡_3.png'],
  ultimate:['主角大絕招_1.png','主角大絕招_2.png','主角大絕招_3.png','主角大絕招_4.png',
    '主角大絕招_5.png','主角大絕招_6.png','主角大絕招_7.png','主角大絕招_8.png',
    '主角大絕招_9.png','主角大絕招_10.png','主角大絕招_11.png','主角大絕招_12.png',
    '主角大絕招_13.png','主角大絕招_14.png','主角大絕招_15.png','主角大絕招_16.png'],
};
HERO_STATE_FILES.idle=['主角走路_1.png'];
HERO_STATE_FILES.spell=HERO_STATE_FILES.ultimate;

function loadHeroSprites(cb){
  let loaded=0,total=0;
  Object.keys(HERO_STATE_FILES).forEach(state=>{
    heroSprites[state]=[];
    HERO_STATE_FILES[state].forEach((f,i)=>{
      total++;
      const img=new Image();
      img.onload=()=>{loaded++;if(loaded>=total)cb()};
      img.onerror=()=>{loaded++;if(loaded>=total)cb()};
      img.src=HERO_SPRITE_PATH+f;
      heroSprites[state][i]=img;
    });
  });
}

function drawHero(ctx,x,y,fIdx,facing,flash,state){
  const img=heroSprites[state]&&heroSprites[state][fIdx];
  if(img&&img.complete&&img.naturalWidth>0){
    ctx.save();ctx.translate(x,y);
    if(facing<0)ctx.scale(-1,1);
    if(flash)ctx.globalAlpha=0.6;
    const tw=72,th=96;
    const sw=img.naturalWidth,sh=img.naturalHeight;
    const sMul=state==='punch'?0.95:1;
    const scale=Math.max(tw/sw,th/sh)*SCALE*0.8*sMul;
    const dw=sw*scale,dh=sh*scale;
    ctx.drawImage(img,-dw/2,-dh,dw,dh);
    ctx.restore();
  }else{
    ctx.save();ctx.translate(x,y);
    if(facing<0)ctx.scale(-1,1);ctx.scale(SCALE*0.8,SCALE*0.8);
    ctx.fillStyle=state==='hurt'?'#f44':'#3a7bd5';
    ctx.fillRect(-15,-32,30,32);
    ctx.fillStyle='#f5cba7';
    ctx.beginPath();ctx.arc(0,-40,10,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
const xiaoguai1Sprites={};
const XIAOGUAI1_PATH='小怪1動作包/';
const XIAOGUAI1_STATE_FILES={
  walk:['小怪1走路_1.png','小怪1走路_2.png','小怪1走路_3.png'],
  attack:['小怪1攻擊_1.png','小怪1攻擊_2.png','小怪1攻擊_3.png'],
  hurt:['小怪1被攻擊.png'],

function startAnim(e,st,cfg,dur){
  const c=cfg||(e.animCfg||ANIM);
  if(e.animState===st&&e.animLoop)return;
  e.animState=st;e.animFrame=0;e.animTimer=dur||c[st].dur;
  e.animLoop=c[st].loop;e.animDone=false;e.animCustomDur=dur||0;
}
function tickAnim(e){
  const c=e.animCfg||ANIM;
  if(e.animDone)return;e.animTimer--;
  if(e.animTimer<=0){e.animFrame++;
    if(e.animFrame>=c[e.animState].frames){
      if(e.animLoop)e.animFrame=0;
      else{e.animFrame=c[e.animState].frames-1;e.animDone=true}
    }e.animTimer=e.animCustomDur||c[e.animState].dur;
  }
}

class Game{
  constructor(canvas){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');
    this.canvas.width=CW;this.canvas.height=CH;
    this.keys={};this.buf=[];
    this.frame=0;this.camX=0;this.shake=0;
    this.cc=0;this.ct=0;this.cd=0;this.cx=0;this.cy=0;
    this.hero=makeHero();this.enemies=[];this.pts=[];this.items=[];this.projs=[];
    this.spawnedItems=new Set();
    this.go=false;this.win=false;this.kills=0;this.hitStop=0;
    this.timeLeft=GAME_TIME;this.timeAcc=0;this.score=0;
    this.spawnTimer=SPAWN_INTERVAL;this.playerName='';this.lbSaved=false;
    this.paused=false;
    window._game=this;
    this.setup();
  }
  setup(){
    window.addEventListener('keydown',e=>{
      const k=e.key.toLowerCase();
      this.keys[k]=true;
      if(['z','x','c','v','s','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)){
        this.buf.push({k,t:this.frame});if(this.buf.length>10)this.buf.shift()
      }
      if(k==='r')this.reset();
      e.preventDefault();
    });
    window.addEventListener('keyup',e=>{this.keys[e.key.toLowerCase()]=false});
    this.setupMobile();
  }
  setupMobile(){
    const dirMap={U:KEY.U,D:KEY.D,L:KEY.L,R:KEY.R};
    document.querySelectorAll('.dpad-btn').forEach(btn=>{
      const dir=btn.dataset.dir;
      const onStart=()=>{this.keys[dirMap[dir]]=true};
      const onEnd=()=>{this.keys[dirMap[dir]]=false};
      btn.addEventListener('touchstart',e=>{e.preventDefault();onStart()});
      btn.addEventListener('touchend',e=>{e.preventDefault();onEnd()});
      btn.addEventListener('touchcancel',e=>{e.preventDefault();onEnd()});
    });
    document.querySelectorAll('.act-btn').forEach(btn=>{
      const key=btn.dataset.key;
      const onStart=()=>{this.keys[key]=true};
      const onEnd=()=>{this.keys[key]=false};
      btn.addEventListener('touchstart',e=>{e.preventDefault();onStart()});
      btn.addEventListener('touchend',e=>{e.preventDefault();onEnd()});
      btn.addEventListener('touchcancel',e=>{e.preventDefault();onEnd()});
    });
  }
  bufCheck(...ks){for(let i=this.buf.length-1;i>=0;i--){if(ks.includes(this.buf[i].k)&&this.frame-this.buf[i].t<10){this.buf.splice(i,1);return true}}return false}
  addP(x,y,col,c=8){for(let i=0;i<c;i++)this.pts.push({x,y,vx:(Math.random()-0.5)*8,vy:-Math.random()*8-2,life:1,decay:0.02+Math.random()*0.03,size:2+Math.random()*4,color:col})}
  pickItem(it){
    const h=this.hero,c=ITEM_CFG[it.t];
    if(c.heal){
      h.hp=Math.min(h.maxHp,h.hp+h.maxHp*0.1);
      it.picked=true;sfx('pick');this.addP(it.x,it.y-10,'#4c4',10);this.addP(it.x,it.y-10,'#8f8',6);
    }else{
      if(h.heldItems.length>=5)return;
      h.heldItems.push({type:it.t,uses:c.uses});
      it.picked=true;sfx('pick');this.addP(it.x,it.y-10,'#ff0',5);
    }
  }
  useItem(){
    const h=this.hero;
    if(!h.heldItems.length||h.itemCD>0)return;
    const item=h.heldItems[0],c=ITEM_CFG[item.type];
    const pY=h.y-55;
    if(item.type==='knife'){
      this.projs.push({x:h.x+h.facing*30,y:pY,vx:h.facing*14,vy:0,type:'knife',col:c.col,life:80,dmg:c.dmg,pierce:true,rot:0});
      sfx('throw');
    }else if(item.type==='grenade'){
      this.projs.push({x:h.x+h.facing*30,y:pY,vx:h.facing*6,vy:-7,type:'grenade',col:c.col,life:120,dmg:c.dmg,pierce:true,explode:true,rot:0,grounded:false,groundY:h.y});
      sfx('throw');
    }
    item.uses--;h.itemCD=20;
    if(item.uses<=0){h.heldItems.shift();sfx('brk')}
  }
  update(){
    if(this.go||this.win)return;
    if(this.paused)return;
    if(this.hitStop>0){this.hitStop--;this.shake*=0.85;if(this.shake<0.1)this.shake=0;return}
    this.frame++;this.shake*=0.85;if(this.shake<0.1)this.shake=0;
    this.updTimer();this.spawnEnemies();this.spawnItems();this.checkPickups();
    this.updHero();this.updEnemies();this.updProjs();this.checkWin();this.updPts();this.updCam();this.updCombo();
  }
  updTimer(){
    this.timeAcc++;
    if(this.timeAcc>=60){this.timeAcc=0;this.timeLeft--;if(this.timeLeft<=0){this.timeLeft=0;this.go=true;if(!this.lbSaved){this.lbSaved=true;addLBEntry(this.playerName,this.score)}}}
  }
  spawnEnemies(){
    this.spawnTimer--;
    if(this.spawnTimer>0)return;
    this.spawnTimer=SPAWN_INTERVAL;
    const alive=this.enemies.filter(e=>e.hp>0);
    if(alive.length>=MAX_ENEMIES)return;
    const bossCount=alive.filter(e=>e.type==='xiaowang').length;
    if(bossCount>=MAX_BOSSES)return;
    const types=['xiaoguai1','xiaoguai2','xiaoguai3'];
    if(bossCount<MAX_BOSSES)types.push('xiaowang');
    const type=types[Math.floor(Math.random()*types.length)];
    const side=Math.random()<0.5?1:-1;
    const sx=side>0?this.hero.x+800+Math.random()*200:this.hero.x-300-Math.random()*200;
    const e=makeEnemy(type,sx,side);
    this.enemies.push(e);
  }
  spawnItems(){
    itemSpawns.forEach(sp=>{
      if(this.spawnedItems.has(sp.x))return;
      if(Math.abs(sp.x-this.hero.x)<800){
        const iy=ROAD_TOP+20+Math.random()*(ROAD_BOTTOM-ROAD_TOP-50);
        this.items.push({x:sp.x,y:iy,t:sp.t,picked:false});this.spawnedItems.add(sp.x)
      }
    });
  }
  checkPickups(){
    const h=this.hero;
    this.items.forEach(it=>{if(!it.picked&&Math.abs(it.x-h.x)<50&&Math.abs(it.y-h.y)<60)this.pickItem(it)});
    this.items=this.items.filter(i=>!i.picked);
  }
  updHero(){
    const h=this.hero;
    if(h.hp<=0){startAnim(h,'death');this.go=true;if(!this.lbSaved){this.lbSaved=true;addLBEntry(this.playerName,this.score)}return}
    if(h.flash>0)h.flash--;if(h.atkCD>0)h.atkCD--;if(h.hitCD>0)h.hitCD--;if(h.itemCD>0)h.itemCD--;
    if(h.ultCD>0)h.ultCD--;
    h.mp=Math.min(h.maxMp,h.mp+HERO.MP_REGEN);
    if(h.hitCD>0){startAnim(h,'hurt');tickAnim(h);return}
    let mx=0,my=0;
    if(this.keys[KEY.L])mx=-1;if(this.keys[KEY.R])mx=1;
    if(this.keys[KEY.U])my=-1;if(this.keys[KEY.D])my=1;
    if(mx||my){
      const spd=this.bufCheck(KEY.L,KEY.R)?HERO.SPD*2:HERO.SPD;
      h.vx=mx*spd;h.vy=my*spd;
      if(mx)h.facing=mx;
      if(ANIM[h.animState].loop)startAnim(h,'walk');
    }else{
      h.vx*=0.8;h.vy*=0.8;if(Math.abs(h.vx)<0.1)h.vx=0;if(Math.abs(h.vy)<0.1)h.vy=0;
      if(ANIM[h.animState].loop)startAnim(h,'idle');
    }
    const punchDur=Math.floor(ANIM.punch.dur*h.punchSpdMul);
    if(this.keys[KEY.P]&&h.atkCD<=0){
      startAnim(h,'punch',null,punchDur);h.atkCD=Math.floor((punchDur*ANIM.punch.frames+3)/h.punchSpdMul);sfx('punch')
    }
    if(h.atkCD>0&&!h.animDone&&h.animState==='punch'&&h.hitCD<=0){
      if(h.animFrame===1&&h.animTimer===punchDur)this.checkAtkHit(h,Math.floor(HERO.ATK_DMG*h.atkDmgMul));
    }
    if(this.keys[KEY.K]&&h.atkCD<=0){
      startAnim(h,'kick');h.atkCD=ANIM.kick.dur*ANIM.kick.frames+3;sfx('hit')
    }
    if(h.atkCD>0&&!h.animDone&&h.animState==='kick'&&h.hitCD<=0){
      const hits=1+h.kickBonusHits;
      if(h.animFrame===1&&h.animTimer===ANIM.kick.dur){
        for(let i=0;i<hits;i++)this.checkAtkHit(h,Math.floor((HERO.ATK_DMG+10)*h.atkDmgMul));
      }
    }
    if(this.keys[KEY.A]&&h.atkCD<=0&&h.ultCD<=0){
      h.ultCD=ULT_COOLDOWN;startAnim(h,'ultimate');h.atkCD=ANIM.ultimate.dur*ANIM.ultimate.frames+5;
      h.ultHits=0;sfx('combo');this.shake=8;
    }
    if(h.animState==='ultimate'&&!h.animDone&&h.atkCD>0&&h.hitCD<=0){
      if(h.animTimer===Math.floor(ANIM.ultimate.dur*0.5)){
        const hits=10+h.ultBonusHits;
        this.checkAtkHitUlt(h,Math.floor(HERO.ATK_DMG*0.6*h.atkDmgMul),hits);
      }
    }
    if(this.keys[KEY.S]&&h.itemCD<=0)this.useItem();
    tickAnim(h);
    if(h.animDone&&!h.animLoop){
      if(mx||my)startAnim(h,'walk');else startAnim(h,'idle')
    }
    this.applyBounds(h);
  }
  checkAtkHit(h,dmg){
    this.enemies.forEach(e=>{
      if(e.hp<=0||e.hitCD>0)return;
      if(Math.abs(e.x-h.x)<HERO.ATK_RNG&&Math.abs(e.y-h.y)<80&&((h.facing>0&&e.x>h.x)||(h.facing<0&&e.x<h.x))){
        e.hp-=dmg;e.hitCD=22;e.flash=10;e.stun=18;e.vx=0;e.vy=0;
        this.cc++;this.ct=60;this.cd=45;
        const ctX=(h.x+h.facing*30+e.x)/2,ctY=h.y-25;
        this.cx=ctX-this.camX;this.cy=ctY-20;
        this.shake=Math.min(this.shake+6,16);
        this.addP(ctX,ctY,'#fff',16);this.addP(ctX,ctY,'#ff0',12);this.addP(ctX,ctY,'#f80',8);
        this.hitStop=6;sfx('punch');
        if(this.cc%5===0){this.shake=16;sfx('combo');this.hitStop=10}
        if(e.hp<=0)this.onEnemyKill(e);
      }
    });
  }
  checkAtkHitUlt(h,dmg,maxHits){
    let hitCount=0;
    this.enemies.forEach(e=>{
      if(e.hp<=0||hitCount>=maxHits)return;
      const dx=Math.abs(e.x-h.x),dy=Math.abs(e.y-h.y);
      if(dx<HERO.ATK_RNG+50&&dy<90&&((h.facing>0&&e.x>h.x)||(h.facing<0&&e.x<h.x))){
        e.hp-=dmg;e.hitCD=18;e.flash=6;e.stun=15;e.vx=0;e.vy=0;
        this.cc++;h.ultHits=(h.ultHits||0)+1;this.ct=60;this.cd=45;hitCount++;
        const ctX=(h.x+h.facing*30+e.x)/2,ctY=h.y-25;
        this.shake=Math.min(this.shake+4,12);
        this.addP(ctX,ctY,'#fff',12);this.addP(ctX,ctY,'#ff0',8);this.addP(ctX,ctY,'#f80',6);
        this.hitStop=3;sfx('hit');
        if(this.cc%5===0){this.shake=14;sfx('combo');this.hitStop=8}
        if(e.hp<=0)this.onEnemyKill(e);
      }
    });
  }
  onEnemyKill(e){
    this.kills++;
    const xp=XP_KILL[e.type]||0;
    this.score+=xp;
    this.hero.xp+=xp;
    sfx('kill');
    while(this.hero.xp>=this.hero.xpToNext){
      this.hero.xp-=this.hero.xpToNext;
      this.hero.level++;
      this.hero.xpToNext=XP_PER_LEVEL;
      this.paused=true;
      showLevelUpCards(this.hero);
    }
  }
  applyBounds(e){
    e.x+=e.vx;e.y+=e.vy;
    e.x=Math.max(20,Math.min(LEVEL_LEN-20,e.x));
    e.y=Math.max(ROAD_TOP+10,Math.min(ROAD_BOTTOM-e.h-5,e.y));
  }
  updEnemies(){
    this.enemies=this.enemies.filter(e=>e.hp>0||!e.animDone);
    this.enemies.forEach(e=>this.updEnemy(e));
  }
  updEnemy(e){
    if(e.hp<=0){
      if(e.animState!=='death'){startAnim(e,'death')}
      tickAnim(e);
      if(e.animDone){}
      else{e.vy+=0.3;e.y+=e.vy;e.x+=e.vx*0.5}
      if(e.animDone)return;
      this.applyBounds(e);return;
    }
    if(e.flash>0)e.flash--;if(e.atkCD>0)e.atkCD--;if(e.hitCD>0)e.hitCD--;if(e.stun>0)e.stun--;
    if(e.kickCD>0)e.kickCD--;
    const dx=this.hero.x-e.x,dy=this.hero.y-e.y,dist=Math.abs(dx),ac=e.animCfg||ANIM;
    e.facing=dx>0?1:-1;
    if(e.hitCD>0||e.stun>0){if(e.hitCD>0)startAnim(e,'hurt');else startAnim(e,'idle');e.charging=false;tickAnim(e);return}
    if(e.type==='xiaowang'&&e.charging){
      e.vx=0;e.vy=0;e.chargeTimer--;
      if(e.chargeTimer<=0){e.charging=false;startAnim(e,'kickfly');e.kickHits=0}
      tickAnim(e);this.applyBounds(e);return;
    }
    if(e.type==='xiaowang'&&e.animState==='kickfly'&&!e.animDone){
      e.vx=0;e.vy=0;
      const kickDmg=[1,2,3,4,6];
      if(kickDmg.includes(e.animFrame)&&e.animTimer===ac.kickfly.dur){
        const isFinal=e.animFrame===6;
        this.checkBossKickfly(e,isFinal);
      }
      tickAnim(e);this.applyBounds(e);return;
    }
    if(e.atkCD>0){
      if(!e.animDone&&e.animState==='attack'&&e.animFrame===2&&e.animTimer===ac.attack.dur)this.checkEnemyAtk(e);
      if(!e.animDone&&e.animState==='kick'&&e.animFrame===1&&e.animTimer===ac.kick.dur)this.checkEnemyAtk(e);
      tickAnim(e);this.applyBounds(e);return
    }
    const d2=Math.sqrt(dx*dx+dy*dy);
    if(!e.entered){
      if(d2>0){e.vx=(dx/d2)*e.spd*4;e.vy=(dy/d2)*e.spd*4}
      startAnim(e,'walk');
      if(d2<400)e.entered=true;
    }else if(dist<550){
      if(dist<55&&e.atkCD<=0){
        if(e.type==='xiaowang'&&(e.atkCount||0)>=10){
          e.atkCount=0;e.charging=true;e.chargeTimer=30;e.vx=0;e.vy=0;
          startAnim(e,'idle');tickAnim(e);this.applyBounds(e);return;
        }else if(e.type==='xiaowang'){
          const move=Math.random()<0.5?'attack':'kick';
          startAnim(e,move);e.atkCD=ac[move].dur*ac[move].frames+50;
        }else{
          startAnim(e,'attack');e.atkCD=ac.attack.dur*ac.attack.frames+50;
        }
      }else{
        if(d2>0){e.vx=(dx/d2)*e.spd;e.vy=(dy/d2)*e.spd}
        startAnim(e,'walk');
      }
    }else{if(d2>0){e.vx=(dx/d2)*e.spd;e.vy=(dy/d2)*e.spd}else{e.vx*=0.9;e.vy*=0.9};startAnim(e,'walk')}
    tickAnim(e);this.applyBounds(e);
  }
  checkBossKickfly(e,isFinal){
    const h=this.hero;
    if(h.hitCD>0)return;
    const atkRange=e.type==='xiaowang'?85:65;
    if(Math.abs(h.x-e.x)<atkRange&&Math.abs(h.y-e.y)<60){
      const rawDmg=isFinal?e.dmg*2:e.dmg;
      const dmg=Math.floor(rawDmg*(h.defMul||1));
      h.hp-=dmg;h.hitCD=25;h.flash=12;
      if(isFinal){h.vx=(h.x>e.x?1:-1)*18;h.vy=-12;this.shake=14;}
      else{h.vx=(h.x>e.x?1:-1)*4;h.vy=-3;this.shake=Math.min(this.shake+4,10);}
      startAnim(h,'hurt');
      this.addP(h.x,h.y,'#f44',10);this.addP(h.x,h.y,'#ff0',6);sfx('phit');this.cc=0;
    }
  }
  checkEnemyAtk(e){
    const h=this.hero;
    if(h.hitCD>0)return;
    if(Math.abs(h.x-e.x)<65&&Math.abs(h.y-e.y)<60){
      const dmg=Math.floor(e.dmg*(h.defMul||1));
      h.hp-=dmg;h.hitCD=20;h.flash=10;h.vy=-6;h.vx=(h.x>e.x?1:-1)*6;this.shake=Math.min(this.shake+3,8);
      if(e.type==='xiaowang')e.atkCount=(e.atkCount||0)+1;
      startAnim(h,'hurt');
      this.addP(h.x,h.y,'#f44',8);sfx('phit');this.cc=0
    }
  }
  updProjs(){
    this.projs.forEach(p=>{
      if(p.type==='knife'){
        p.x+=p.vx;p.rot+=0.3;p.life--;
        this.enemies.forEach(e=>{
          if(e.hp<=0)return;
          if(Math.abs(p.x-e.x)<30&&Math.abs(p.y-e.y)<40){
            e.hp-=p.dmg;e.hitCD=15;e.flash=8;e.stun=10;e.vx=0;e.vy=0;
            const ctX=(p.x+e.x)/2,ctY=(p.y+e.y)/2;
            this.addP(ctX,ctY,'#fff',10);this.addP(ctX,ctY,'#ff0',8);this.addP(ctX,ctY,'#f80',6);
            this.shake=Math.min(this.shake+3,8);sfx('hit');
            this.cc++;this.ct=60;this.cd=45;this.cx=ctX-this.camX;this.cy=ctY-20;
            if(e.hp<=0)this.onEnemyKill(e);
          }
        });
      }else if(p.type==='grenade'){
        p.x+=p.vx;p.y+=p.vy;p.rot+=0.25;p.life--;
        if(!p.grounded){
          p.vy+=0.45;
          if(p.y>=p.groundY){
            p.y=p.groundY;p.grounded=true;p.vy=0;p.vx=0;
            this.shake=12;sfx('combo');
            this.enemies.forEach(e=>{
              if(e.hp<=0)return;
              const dist=Math.abs(e.x-p.x);
              if(dist<120){
                const dmgFalloff=Math.max(0,1-dist/120);
                const finalDmg=Math.round(p.dmg*dmgFalloff);
                e.hp-=finalDmg;e.hitCD=18;e.flash=10;e.stun=15;
                e.vx=(e.x>p.x?1:-1)*8;e.vy=-6;
                this.addP(e.x,e.y,'#f80',10);this.addP(e.x,e.y,'#ff0',8);
                if(e.hp<=0)this.onEnemyKill(e);
              }
            });
            for(let i=0;i<20;i++)this.addP(p.x+(Math.random()-0.5)*40,p.y-10,'#f80',1);
            for(let i=0;i<14;i++)this.addP(p.x+(Math.random()-0.5)*60,p.y-5,'#ff0',1);
            for(let i=0;i<8;i++)this.addP(p.x+(Math.random()-0.5)*80,p.y,'#fff',1);
          }
        }
      }
    });
    this.projs=this.projs.filter(p=>p.life>0);
  }
  updPts(){this.pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay});this.pts=this.pts.filter(p=>p.life>0)}
  updCam(){const t=this.hero.x-CW*0.35;this.camX+=(t-this.camX)*0.08;this.camX=Math.max(0,Math.min(LEVEL_LEN-CW,this.camX))}
  updCombo(){if(this.ct>0){this.ct--;if(this.ct<=0)this.cc=0}if(this.cd>0)this.cd--}
  checkWin(){}

      ctx.fillStyle='#f44';ctx.font='bold 60px sans-serif';ctx.textAlign='center';
      ctx.fillText(this.timeLeft<=0?'TIME UP!':'GAME OVER',CW/2,CH/2-30);
      ctx.fillStyle='#fff';ctx.font='24px sans-serif';
      ctx.fillText('最終分數: '+this.score,CW/2,CH/2+20);
      ctx.fillStyle='#aaa';ctx.font='18px sans-serif';
      ctx.fillText('擊敗 '+this.kills+' 個敵人 | Lv.'+h.level,CW/2,CH/2+55);
      ctx.fillText('按 R 重新開始',CW/2,CH/2+85);
    }
    ctx.restore();
  }
  reset(){
    this.hero=makeHero();this.hero.playerName=this.playerName;
    this.enemies=[];this.pts=[];this.items=[];this.projs=[];
    this.spawnedItems=new Set();
    this.go=false;this.win=false;this.cc=0;this.ct=0;this.cd=0;this.kills=0;this.camX=0;this.shake=0;this.hitStop=0;
    this.timeLeft=GAME_TIME;this.timeAcc=0;this.score=0;
    this.spawnTimer=SPAWN_INTERVAL;this.lbSaved=false;this.paused=false;
    pendingLevelUp=false;
  }
  start(){const loop=()=>{this.update();this.render();this.animId=requestAnimationFrame(loop)};loop()}
  stop(){if(this.animId)cancelAnimationFrame(this.animId)}
}

// ============================================================
// BOOT
// ============================================================
const canvas=document.getElementById('game');
function resize(){
  const mw=Math.min(window.innerWidth-40,960),r=540/960;
  canvas.style.width=mw+'px';canvas.style.height=(mw*r)+'px'
}
window.addEventListener('resize',resize);resize();

let gameInstance=null;
function startGame(){
  const name=document.getElementById('playerNameInput').value.trim();
  if(!name){document.getElementById('playerNameInput').style.borderColor='#f44';return}
  document.getElementById('nameModal').classList.remove('active');
  document.getElementById('playerNameInput').blur();
  document.activeElement&&document.activeElement.blur();
  document.getElementById('leaderboardBtn').style.display='block';
  if(!gameInstance){
    loadHeroSprites(()=>{loadXiaoguai1Sprites(()=>{loadXiaoguai2Sprites(()=>{loadXiaoguai3Sprites(()=>{loadXiaowangSprites(()=>{loadSceneImages(()=>{loadItemImages(()=>{
      gameInstance=new Game(canvas);
      gameInstance.playerName=name;
      gameInstance.hero.playerName=name;
      gameInstance.start();
    })})})})})})});
  }else{
    gameInstance.playerName=name;
    gameInstance.reset();
  }
}
document.getElementById('playerNameInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')startGame();
  e.stopPropagation();
});
document.getElementById('leaderboardBtn').style.display='none';
</script>
